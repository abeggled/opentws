<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .proto-tag { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
    .label-main { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; fill: #FFFFFF; letter-spacing: 2px; }
    .label-sub  { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400; fill: #5B9CF6; letter-spacing: 3px; }
    .grid-line  { stroke: #2E3650; stroke-width: 0.5; fill: none; opacity: 0.4; }
    .wire-amber { stroke: #F5A623; stroke-width: 1.5; fill: none; opacity: 0.7; }
    .wire-blue  { stroke: #5B9CF6; stroke-width: 1.5; fill: none; opacity: 0.7; }
    .wire-gray  { stroke: #3A4460; stroke-width: 1.5; fill: none; opacity: 0.8; stroke-dasharray: 3 2.5; }
    .pill-teal  { fill: rgba(29,207,171,0.12); stroke: #1DCFAB; stroke-width: 0.8; }
    .pill-amber { fill: rgba(245,166,35,0.12);  stroke: #F5A623;  stroke-width: 0.8; }
    .pill-blue  { fill: rgba(91,156,246,0.12);  stroke: #5B9CF6;  stroke-width: 0.8; }
  </style>
</defs>

<!-- Background -->
<rect width="400" height="400" fill="#0F1320"/>

<!-- Logo square -->
<rect x="80" y="30" width="240" height="240" rx="32" fill="#1A1F2E"/>

<!-- Grid -->
<line x1="80"  y1="90"  x2="320" y2="90"  class="grid-line"/>
<line x1="80"  y1="150" x2="320" y2="150" class="grid-line"/>
<line x1="80"  y1="210" x2="320" y2="210" class="grid-line"/>
<line x1="140" y1="30"  x2="140" y2="270" class="grid-line"/>
<line x1="200" y1="30"  x2="200" y2="270" class="grid-line"/>
<line x1="260" y1="30"  x2="260" y2="270" class="grid-line"/>

<!-- Border -->
<rect x="80" y="30" width="240" height="240" rx="32" fill="none" stroke="#2E3650" stroke-width="2"/>

<!-- Corner marks -->
<path d="M97 30 L80 30 L80 47"    fill="none" stroke="#1DCFAB" stroke-width="3" stroke-linecap="round"/>
<path d="M303 30 L320 30 L320 47"  fill="none" stroke="#1DCFAB" stroke-width="3" stroke-linecap="round"/>
<path d="M97 270 L80 270 L80 253"  fill="none" stroke="#1DCFAB" stroke-width="3" stroke-linecap="round"/>
<path d="M303 270 L320 270 L320 253" fill="none" stroke="#1DCFAB" stroke-width="3" stroke-linecap="round"/>

<!-- Central MQTT hub -->
<circle cx="200" cy="150" r="30" fill="#1A1F2E" stroke="#1DCFAB" stroke-width="1.5"/>
<circle cx="200" cy="150" r="23" fill="#1DCFAB" opacity="0.08"/>
<circle cx="200" cy="150" r="14" fill="none" stroke="#1DCFAB" stroke-width="1.5" opacity="0.5"/>
<circle cx="200" cy="150" r="8"  fill="#1DCFAB" opacity="0.9"/>

<!-- KNX node (top-left) -->
<circle cx="122" cy="82" r="17" fill="#1A1F2E" stroke="#F5A623" stroke-width="1.5"/>
<circle cx="122" cy="82" r="9"  fill="#F5A623" opacity="0.9"/>

<!-- Modbus node (top-right) -->
<circle cx="278" cy="82" r="17" fill="#1A1F2E" stroke="#5B9CF6" stroke-width="1.5"/>
<circle cx="278" cy="82" r="9"  fill="#5B9CF6" opacity="0.9"/>

<!-- 1-Wire node (bottom) -->
<circle cx="200" cy="232" r="17" fill="#1A1F2E" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="3 2"/>
<circle cx="200" cy="232" r="9"  fill="#F5A623" opacity="0.6"/>

<!-- Extension node left -->
<circle cx="96"  cy="170" r="13" fill="#1A1F2E" stroke="#3A4460" stroke-width="1.5" stroke-dasharray="3 2.5"/>
<circle cx="96"  cy="170" r="6"  fill="#3A4460" opacity="0.7"/>

<!-- Extension node right -->
<circle cx="304" cy="170" r="13" fill="#1A1F2E" stroke="#3A4460" stroke-width="1.5" stroke-dasharray="3 2.5"/>
<circle cx="304" cy="170" r="6"  fill="#3A4460" opacity="0.7"/>

<!-- Wires -->
<line x1="136" y1="91"  x2="180" y2="133" class="wire-amber"/>
<line x1="264" y1="91"  x2="220" y2="133" class="wire-blue"/>
<line x1="200" y1="215" x2="200" y2="181" class="wire-amber"/>
<line x1="107" y1="162" x2="170" y2="152" class="wire-gray"/>
<line x1="293" y1="162" x2="230" y2="152" class="wire-gray"/>

<!-- Protocol labels -->
<text x="122" y="78"  text-anchor="middle" class="proto-tag" fill="#F5A623">KNX</text>
<text x="278" y="78"  text-anchor="middle" class="proto-tag" fill="#5B9CF6">MOD</text>
<text x="200" y="255" text-anchor="middle" class="proto-tag" fill="#F5A623">1-W</text>
<text x="200" y="155" text-anchor="middle" class="proto-tag" fill="#1DCFAB">MQTT</text>

<!-- Wordmark -->
<text x="200" y="308" text-anchor="middle" class="label-main">openTWS</text>
<text x="200" y="332" text-anchor="middle" class="label-sub">MULTIPROTOCOL SERVER</text>

<!-- Pills -->
<rect x="108" y="350" width="50" height="18" rx="5" class="pill-amber"/>
<text x="133" y="363" text-anchor="middle" class="proto-tag" fill="#F5A623">KNX</text>

<rect x="166" y="350" width="68" height="18" rx="5" class="pill-blue"/>
<text x="200" y="363" text-anchor="middle" class="proto-tag" fill="#5B9CF6">MODBUS</text>

<rect x="242" y="350" width="50" height="18" rx="5" class="pill-amber"/>
<text x="267" y="363" text-anchor="middle" class="proto-tag" fill="#F5A623">1-WIRE</text>

<rect x="168" y="376" width="64" height="18" rx="5" class="pill-teal"/>
<text x="200" y="389" text-anchor="middle" class="proto-tag" fill="#1DCFAB">MQTT</text>

</svg>
