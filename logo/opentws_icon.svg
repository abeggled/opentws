<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .proto-tag { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .grid-line  { stroke: #2E3650; stroke-width: 0.5; fill: none; opacity: 0.4; }
    .wire-amber { stroke: #F5A623; stroke-width: 1.8; fill: none; opacity: 0.7; }
    .wire-blue  { stroke: #5B9CF6; stroke-width: 1.8; fill: none; opacity: 0.7; }
    .wire-gray  { stroke: #3A4460; stroke-width: 1.8; fill: none; opacity: 0.8; stroke-dasharray: 3 2.5; }
  </style>
</defs>

<!-- Background square -->
<rect width="400" height="400" fill="#0F1320"/>
<rect x="20" y="20" width="360" height="360" rx="48" fill="#1A1F2E"/>

<!-- Grid -->
<line x1="20"  y1="110" x2="380" y2="110" class="grid-line"/>
<line x1="20"  y1="200" x2="380" y2="200" class="grid-line"/>
<line x1="20"  y1="290" x2="380" y2="290" class="grid-line"/>
<line x1="110" y1="20"  x2="110" y2="380" class="grid-line"/>
<line x1="200" y1="20"  x2="200" y2="380" class="grid-line"/>
<line x1="290" y1="20"  x2="290" y2="380" class="grid-line"/>

<!-- Border -->
<rect x="20" y="20" width="360" height="360" rx="48" fill="none" stroke="#2E3650" stroke-width="2.5"/>

<!-- Corner marks -->
<path d="M46 20 L20 20 L20 46"    fill="none" stroke="#1DCFAB" stroke-width="4" stroke-linecap="round"/>
<path d="M354 20 L380 20 L380 46"  fill="none" stroke="#1DCFAB" stroke-width="4" stroke-linecap="round"/>
<path d="M46 380 L20 380 L20 354"  fill="none" stroke="#1DCFAB" stroke-width="4" stroke-linecap="round"/>
<path d="M354 380 L380 380 L380 354" fill="none" stroke="#1DCFAB" stroke-width="4" stroke-linecap="round"/>

<!-- Central MQTT hub -->
<circle cx="200" cy="200" r="44" fill="#1A1F2E" stroke="#1DCFAB" stroke-width="2"/>
<circle cx="200" cy="200" r="34" fill="#1DCFAB" opacity="0.08"/>
<circle cx="200" cy="200" r="20" fill="none" stroke="#1DCFAB" stroke-width="2" opacity="0.5"/>
<circle cx="200" cy="200" r="11" fill="#1DCFAB" opacity="0.95"/>

<!-- KNX node top-left -->
<circle cx="100" cy="100" r="26" fill="#1A1F2E" stroke="#F5A623" stroke-width="2"/>
<circle cx="100" cy="100" r="13" fill="#F5A623" opacity="0.95"/>

<!-- Modbus node top-right -->
<circle cx="300" cy="100" r="26" fill="#1A1F2E" stroke="#5B9CF6" stroke-width="2"/>
<circle cx="300" cy="100" r="13" fill="#5B9CF6" opacity="0.95"/>

<!-- 1-Wire node bottom -->
<circle cx="200" cy="316" r="26" fill="#1A1F2E" stroke="#F5A623" stroke-width="2" stroke-dasharray="4 3"/>
<circle cx="200" cy="316" r="13" fill="#F5A623" opacity="0.65"/>

<!-- Extension node left -->
<circle cx="68"  cy="230" r="20" fill="#1A1F2E" stroke="#3A4460" stroke-width="2" stroke-dasharray="3 2.5"/>
<circle cx="68"  cy="230" r="9"  fill="#3A4460" opacity="0.75"/>

<!-- Extension node right -->
<circle cx="332" cy="230" r="20" fill="#1A1F2E" stroke="#3A4460" stroke-width="2" stroke-dasharray="3 2.5"/>
<circle cx="332" cy="230" r="9"  fill="#3A4460" opacity="0.75"/>

<!-- Wires -->
<line x1="119" y1="117" x2="170" y2="168" class="wire-amber"/>
<line x1="281" y1="117" x2="230" y2="168" class="wire-blue"/>
<line x1="200" y1="290" x2="200" y2="245" class="wire-amber"/>
<line x1="86"  y1="220" x2="156" y2="204" class="wire-gray"/>
<line x1="314" y1="220" x2="244" y2="204" class="wire-gray"/>

<!-- Protocol labels -->
<text x="100" y="95"  text-anchor="middle" class="proto-tag" fill="#F5A623">KNX</text>
<text x="300" y="95"  text-anchor="middle" class="proto-tag" fill="#5B9CF6">MOD</text>
<text x="200" y="340" text-anchor="middle" class="proto-tag" fill="#F5A623">1-W</text>
<text x="200" y="205" text-anchor="middle" class="proto-tag" fill="#1DCFAB">MQTT</text>

</svg>
