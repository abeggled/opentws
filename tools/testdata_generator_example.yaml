# OpenTWS Test Data Generator — Example Configuration
# Run with: python tools/testdata_generator.py tools/testdata_generator_example.yaml
#
# Remove any top-level section (knx / modbus / mqtt) to disable that protocol.
#
# Value generation modes:
#   fixed      constant value          (requires: value)
#   sine       sine wave min→max       (optional: period [s], default 60)
#   random     uniform random min→max
#   ramp       linear min→max, wraps   (optional: period [s], default 60)
#   sequence   cycles through a list   (requires: values: [...])
#   toggle     alternates true/false

# ---------------------------------------------------------------------------
# KNX — connects as tunneling client and sends GroupValueWrite telegrams
# ---------------------------------------------------------------------------
knx:
  connection_type: tunneling   # tunneling | routing
  host: 192.168.1.100
  port: 3671
  # local_ip: 192.168.1.50    # only needed for routing/multicast

  telegrams:
    # Temperature (DPT 9.001 = 2-byte float, °C)
    - group_address: "1/1/1"
      dpt_id: "DPT9.001"
      interval: 5.0            # seconds between telegrams
      mode: sine
      min: 18.0
      max: 25.0
      period: 120.0            # full sine cycle in seconds

    # Brightness (DPT 5.001 = 1-byte percentage 0–100 %)
    - group_address: "1/1/2"
      dpt_id: "DPT5.001"
      interval: 3.0
      mode: ramp
      min: 0
      max: 100
      period: 60.0

    # Switch / boolean (DPT 1.001)
    - group_address: "1/1/3"
      dpt_id: "DPT1.001"
      interval: 10.0
      mode: toggle

    # Fixed value (DPT 9.001, always 21.5 °C)
    - group_address: "1/1/4"
      dpt_id: "DPT9.001"
      interval: 30.0
      mode: fixed
      value: 21.5

    # Sequence (DPT 5.001, cycles 0 % → 25 % → 50 % → 75 % → 100 %)
    - group_address: "1/1/5"
      dpt_id: "DPT5.001"
      interval: 5.0
      mode: sequence
      values: [0, 25, 50, 75, 100]

# ---------------------------------------------------------------------------
# Modbus TCP — runs as a slave/server on the configured port.
# openTWS Modbus TCP adapter connects TO this server and polls the registers.
# ---------------------------------------------------------------------------
modbus:
  host: 0.0.0.0               # listen on all interfaces
  port: 5020                  # use 5020 to avoid needing root; openTWS connects here
  unit_id: 1

  registers:
    # Holding register 0: simulated temperature (uint16, scale 0.1 → 180–250 = 18.0–25.0 °C)
    - register_type: holding
      address: 0
      data_format: uint16
      scale_factor: 0.1       # raw × 0.1 = °C  →  configure same scale_factor in openTWS binding
      mode: sine
      min: 180                # raw value (= 18.0 °C after ×0.1 in adapter)
      max: 250
      interval: 2.0
      period: 120.0

    # Holding register 2: wind speed (float32, two registers)
    - register_type: holding
      address: 2
      data_format: float32
      scale_factor: 1.0
      mode: random
      min: 0.0
      max: 15.0
      interval: 3.0

    # Holding register 4: counter (uint32, two registers)
    - register_type: holding
      address: 4
      data_format: uint32
      scale_factor: 1.0
      mode: ramp
      min: 0
      max: 10000
      interval: 1.0
      period: 100.0

    # Coil 0: relay state (boolean)
    - register_type: coil
      address: 0
      mode: toggle
      interval: 8.0

    # Input register 0: voltage (uint16, scale 0.01 → 0–32000 = 0–320.00 V)
    - register_type: input
      address: 0
      data_format: uint16
      scale_factor: 0.01
      mode: sine
      min: 22000              # raw (= 220.00 V)
      max: 24000              # raw (= 240.00 V)
      interval: 5.0
      period: 60.0

# ---------------------------------------------------------------------------
# MQTT — publishes to an existing broker.
# openTWS MQTT adapter subscribes to these topics.
# ---------------------------------------------------------------------------
mqtt:
  host: localhost
  port: 1883
  # username: myuser
  # password: mypassword

  topics:
    # Temperature as plain float
    - topic: test/temperature
      interval: 5.0
      mode: sine
      min: 18.0
      max: 25.0
      period: 120.0

    # Humidity as plain float
    - topic: test/humidity
      interval: 7.0
      mode: random
      min: 40.0
      max: 80.0

    # On/Off switch
    - topic: test/switch
      interval: 10.0
      mode: toggle
      retain: true

    # JSON payload with nested value (configure json_key: "value" in openTWS binding)
    - topic: test/sensor/json
      interval: 4.0
      mode: ramp
      min: 0.0
      max: 100.0
      period: 60.0
      payload_template: '{"sensor":"test","value":###DP###,"unit":"%"}'

    # Sequence — cycles through predefined steps
    - topic: test/setpoint
      interval: 15.0
      mode: sequence
      values: [16.0, 18.0, 20.0, 22.0, 24.0]
      retain: true
