# from the demo CSV file, matching their respective DPT types.
# The generator acts as a KNX/IP tunneling SERVER (gateway simulator).
# Configure the open bridge server KNX adapter with:
#   connection_type: tunneling
#   host: 127.0.0.1
#   port: 4001
#
# Rate limiting: max_events_per_second caps total KNX telegram rate.

