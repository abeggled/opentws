    # --- 5/1 Zeit und Datum (DPT7.007 = s/Betriebszeit, DPT1.001) ---
    # Note: DPT10 (time-of-day) and DPT11 (date) and DPT19 (datetime) are
    # complex to generate dynamically; represented by fixed/sequence alternatives.

    - group_address: "5/1/11"
      dpt_id: "DPT7.007"
      interval: 60.0
      mode: ramp
      min: 0
      max: 65535
      period: 3600.0

